name: Deploy to VPS

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: '15 22 * * *' # 05:15 WIB (approx 6 AM)
    - cron: '15 14 * * *' # 21:15 WIB (approx 10 PM)

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Application (and sync data)
        run: npm run build

      - name: Copy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          source: "dist/*"
          target: "/var/www/wr.naelvi.com/html/rename/"
          strip_components: 1
